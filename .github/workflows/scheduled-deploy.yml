name: Scheduled Deploy

on:
  schedule:
    # Every day at 06:00 UTC (08:00 CET)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for .GitInfo

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.145.0'
          extended: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Build
        run: hugo --minify
        env:
          HUGO_ENVIRONMENT: production

      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy public --project-name=riskitera-blog --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Notify n8n (content repurposing)
        if: success()
        run: |
          curl -s -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"event":"deploy","timestamp":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}' \
            || true
