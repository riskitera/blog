{{/* Search modal - triggered by Ctrl+K or search icon */}}
<div id="search-modal" class="fixed inset-0 z-[100] hidden" role="dialog" aria-modal="true" aria-label="{{ i18n "search_placeholder" | default "Search..." }}">

  {{/* Backdrop */}}
  <div id="search-backdrop" class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>

  {{/* Modal content */}}
  <div class="relative z-10 max-w-2xl mx-auto mt-[15vh] px-4">
    <div class="bg-rk-card border border-rk-border rounded-xl shadow-2xl overflow-hidden">

      {{/* Search input */}}
      <div class="flex items-center gap-3 px-5 border-b border-rk-border">
        <svg class="w-5 h-5 text-rk-text-secondary shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
        <input
          id="search-input"
          type="text"
          placeholder="{{ i18n "search_placeholder" | default "Search articles..." }}"
          class="w-full bg-transparent py-4 text-rk-text placeholder-rk-text-secondary text-base focus:outline-none"
          autocomplete="off"
          spellcheck="false"
        >
        <kbd class="hidden sm:inline-flex items-center text-xs text-rk-text-secondary border border-rk-border rounded px-1.5 py-0.5 font-mono">
          ESC
        </kbd>
      </div>

      {{/* Results container */}}
      <div id="search-results" class="max-h-[50vh] overflow-y-auto">
        {{/* Results are injected here by JS */}}
        <div id="search-empty" class="px-5 py-8 text-center text-rk-text-secondary text-sm">
          {{ i18n "search_hint" | default "Type to search across all articles..." }}
        </div>
      </div>
    </div>
  </div>
</div>
