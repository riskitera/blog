<article class="card group flex flex-col h-full">
  <div class="flex items-center gap-3 mb-4">
    {{ with .Params.logo }}
    <img src="{{ . }}" alt="{{ $.Params.company }}" class="h-10 w-10 rounded-lg object-contain bg-white p-1">
    {{ end }}
    {{ with .Params.company }}
    <span class="text-sm text-rk-text-secondary font-medium">{{ . }}</span>
    {{ end }}
  </div>
  <h3 class="text-lg font-semibold mb-2 group-hover:text-rk-blue transition-colors">
    <a href="{{ .Permalink }}" class="text-rk-text hover:text-rk-blue no-underline">{{ .Title }}</a>
  </h3>
  <p class="text-rk-text-secondary text-sm mb-4 flex-1">
    {{ with .Description }}{{ . }}{{ else }}{{ .Summary | plainify | truncate 160 }}{{ end }}
  </p>
  <div class="flex items-center justify-between mt-auto">
    {{ with .Params.industry }}
    <span class="text-xs px-2.5 py-1 rounded-full bg-rk-violet/10 text-rk-violet">{{ . }}</span>
    {{ end }}
    <a href="{{ .Permalink }}" class="text-sm text-rk-blue hover:text-rk-cyan">{{ i18n "read_more" }} →</a>
  </div>
</article>
